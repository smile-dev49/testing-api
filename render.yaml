# Render Blueprint — deploy from repo root so requirements.txt and main.py are found.
# Manual Web Service: Root Directory empty (not "src"), and add PYTHON_VERSION=3.12.8 in Environment.
# Python version: .python-version + PYTHON_VERSION here (runtime.txt is not used by Render).
services:
  - type: web
    name: testing-api
    runtime: python
    # Pin Python so pydantic-core installs from wheels (3.14 often triggers a Rust source build on Render).
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
